<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrendWave - Login</title>
    <link rel="stylesheet" href="style1.css">
</head>

<body>
    <div id="back">
        <a href="index.html">Back to Home page</a>
    </div>
    <h1 id="title">TrendWave</h1>
    <div id="login">
        <h1 id="logg">Login or create account</h1>
        <label for="userInput" id="mob">Mobile/Email</label>
        <input type="text" id="userInput" name="userInput" placeholder="Mobile number or email" required>

        <label for="password" id="pas">Password</label>
        <input type="password" id="password" name="password" placeholder="Enter your password" required>

        <button id="submit" type="submit">Login</button>
        <button id="Sign" type="submit">Create account</button>
    </div>
    <script src="index1.js"></script>
</body>

</html>
